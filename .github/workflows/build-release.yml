name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow
          pip install -r requirements.txt

      - name: Generate icon
        run: python create_icon.py

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed `
            --name "财联社监控" `
            --icon=assets/icon.ico `
            --clean --noconfirm `
            cls_app.py

      - name: Create Windows zip
        run: |
          Compress-Archive -Path "dist/财联社监控.exe" -DestinationPath "财联社监控-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: 财联社监控-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow
          pip install -r requirements.txt

      - name: Generate icon
        run: python create_icon.py

      - name: Build macOS app
        run: |
          pyinstaller --windowed \
            --name "财联社监控" \
            --clean --noconfirm \
            cls_app.py

      - name: Create macOS zip
        run: |
          # 由于 create-dmg 经常失败，直接打包为 zip
          cd dist
          zip -r "../财联社监控-macOS.zip" "财联社监控.app"
          cd ..

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: 财联社监控-macOS.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-build/*.zip
            artifacts/macos-build/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
