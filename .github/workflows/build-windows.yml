name: Build Windows EXE

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name "cls_monitor" cls_app.py

      - name: Verify EXE exists
        shell: bash
        run: |
          ls -lh ./dist/cls_monitor.exe

      - name: Get upload URL
        id: release_info
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          UPLOAD_URL=$(echo "$RESPONSE" | python -c "import json,sys; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
          echo "Upload URL: $UPLOAD_URL"

      - name: Upload Windows EXE
        shell: bash
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            "${{ steps.release_info.outputs.upload_url }}?name=cls_monitor_Windows.exe" \
            --data-binary @"./dist/cls_monitor.exe")
          echo "$RESPONSE"
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" != "201" ]; then
            echo "Upload failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Upload successful!"
